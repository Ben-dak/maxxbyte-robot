<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BiteBot</title>
    <script>
        (function() {
            var href = document.location.href.replace(/[#?].*$/, '').replace(/\/[^/]*$/, '/');
            var base = document.createElement('base');
            base.href = href;
            document.head.insertBefore(base, document.head.firstChild);
        })();
    </script>
    <!--  CSS  -->
    <link rel="stylesheet" href="css/lib/bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.cdnfonts.com/css/horizon-2" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <!--  JS  -->
    <script src="js/lib/axios.min.js"></script>
    <script src="js/lib/mustache.js"></script>
    <script src="js/lib/bootstrap.min.js"></script>
    <script src="js/lib/jquery.min.js"></script>

    <script src="js/config.js"></script>
    <script src="js/template-builder.js"></script>
    <script src="js/services/products-service.js"></script>
    <script src="js/services/categories-service.js"></script>
    <script src="js/services/user-service.js"></script>
    <script src="js/services/profile-service.js"></script>
    <script src="js/services/shoppingcart-service.js"></script>
    <script src="js/services/orders-service.js"></script>
    <script src="js/services/robot-service.js"></script>

    <script src="js/filter.js"></script>
    <script src="js/campus-map.js"></script>
    <script src="js/bitebot-flow.js"></script>
    <script src="js/application.js"></script>
</head>
<body>

    <header id="header-user"></header>

    <section id="errors">
    </section>

    <section id="login"></section>

    <main id="main">
    </main>

    <footer></footer>

    <!-- Cart Overlay (available on all pages) -->
    <div id="cart-overlay-backdrop" class="cart-overlay-backdrop cart-overlay-backdrop--hidden" onclick="closeCartOverlay()"></div>
    <div id="cart-overlay-panel" class="cart-overlay-panel cart-overlay-panel--hidden">
        <div class="cart-overlay-title-bar">
            <h2 class="cart-overlay-title">CART</h2>
        </div>
        <div class="cart-overlay-subtotal-row">
            <div class="cart-overlay-subtotal-label">SUBTOTAL <span class="cart-overlay-subtotal-note">(taxes/fees not included)</span></div>
            <span id="cart-overlay-subtotal" class="cart-overlay-subtotal-value">$0.00</span>
        </div>
        <div id="cart-overlay-items-list" class="cart-overlay-items-list"></div>
        <div class="cart-overlay-summary">
            <div class="cart-overlay-row"><span>Delivery Fee</span><span>FREE</span></div>
            <div class="cart-overlay-row"><span>Tax</span><span id="cart-overlay-tax">$0.00</span></div>
            <div class="cart-overlay-row cart-overlay-total-row"><span>TOTAL</span><span id="cart-overlay-total">$0.00</span></div>
        </div>
        <div class="cart-overlay-actions">
            <button type="button" class="btn cart-overlay-keep-shopping" onclick="closeCartOverlay()">KEEP SHOPPING</button>
            <button type="button" id="cart-overlay-checkout-btn" class="btn cart-overlay-checkout" onclick="cartOverlayGoToCheckout()">CHECK OUT - $0.00</button>
        </div>
    </div>

</body>
</html>
