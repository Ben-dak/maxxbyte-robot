<section class="screen create-account-screen">
    <header class="bitebot-checkout-header create-account-header">
        <div class="bitebot-checkout-header-left">
            <a href="#" class="bitebot-checkout-back" onclick="loadHome(); return false;">&lt; RETURN HOME</a>
        </div>
        <div class="bitebot-checkout-header-center">
            <img class="bitebot-checkout-logo" src="{{logoUrl}}" alt="BiteBot">
        </div>
        <div class="bitebot-checkout-header-right">
        </div>
    </header>

    <div class="create-account-title-bar">
        <h1 class="create-account-title">CREATE AN ACCOUNT</h1>
    </div>

    <div class="create-account-body">
        <div class="create-account-columns">
            <div class="create-account-panel create-account-profile-panel">
                <h2 class="create-account-panel-title">PROFILE INFO <i class="fa-regular fa-user create-account-panel-icon"></i></h2>
                <div class="create-account-fields">
                    <div class="create-account-row-fields">
                        <input type="text" id="register-firstName" class="create-account-input" placeholder="First Name" required>
                        <input type="text" id="register-lastName" class="create-account-input" placeholder="Last Name" required>
                    </div>
                    <div class="create-account-field">
                        <select id="register-deliveryAddress" class="create-account-input create-account-select" onchange="fillAddressFromSelection()">
                            <option value="">-- Select Delivery Location --</option>
                            <option value="campus-north">Campus North - 100 University Ave</option>
                            <option value="campus-south">Campus South - 200 College Blvd</option>
                            <option value="downtown">Downtown Hub - 50 Main Street</option>
                            <option value="tech-park">Tech Park - 300 Innovation Dr</option>
                        </select>
                    </div>
                    <div class="create-account-row-fields">
                        <input type="text" id="register-city" class="create-account-input" placeholder="City" readonly>
                        <input type="text" id="register-zip" class="create-account-input create-account-input-zip" placeholder="Zip" readonly>
                    </div>
                    <div class="create-account-row-fields">
                        <input type="text" id="register-state" class="create-account-input" placeholder="State" readonly>
                        <input type="text" id="register-country" class="create-account-input" placeholder="Country" readonly>
                    </div>
                    <div class="create-account-field">
                        <input type="text" id="register-username" class="create-account-input" placeholder="Email Address" autocomplete="username" required>
                    </div>
                    <div class="create-account-field">
                        <input type="password" id="register-password" class="create-account-input" placeholder="Password" autocomplete="new-password" required>
                    </div>
                    <div class="create-account-field">
                        <input type="password" id="register-confirm" class="create-account-input" placeholder="Confirm Password" autocomplete="new-password" required>
                    </div>
                </div>
            </div>

            <div class="create-account-panel create-account-billing-panel">
                <h2 class="create-account-panel-title">BILLING INFO <i class="fa-regular fa-credit-card create-account-panel-icon"></i></h2>
                <div class="create-account-fields">
                    <div class="create-account-field">
                        <input type="text" id="register-cardNumber" class="create-account-input" placeholder="Debit or Credit Card Number" maxlength="19" readonly>
                    </div>
                    <div class="create-account-row-fields">
                        <input type="text" id="register-exp" class="create-account-input create-account-input-exp" placeholder="MM/YY" maxlength="5" readonly>
                        <input type="text" id="register-cvv" class="create-account-input create-account-input-cvv" placeholder="CVV" maxlength="4" readonly>
                    </div>
                    <div class="create-account-field">
                        <input type="text" id="register-billingAddress" class="create-account-input" placeholder="Billing Address" readonly>
                    </div>
                    <div class="create-account-row-fields">
                        <input type="text" id="register-billingCity" class="create-account-input" placeholder="Billing City" readonly>
                        <input type="text" id="register-billingZip" class="create-account-input create-account-input-zip" placeholder="Billing Zip" readonly>
                    </div>
                    <div class="create-account-row-fields">
                        <input type="text" id="register-billingState" class="create-account-input" placeholder="Billing State" readonly>
                        <input type="text" id="register-billingCountry" class="create-account-input" placeholder="Billing Country" readonly>
                    </div>
                </div>
            </div>
        </div>
        <div class="create-account-actions">
            <button type="button" class="btn create-account-submit-btn" onclick="registerAndGoToRestaurant()">CREATE ACCOUNT</button>
        </div>
        <div id="register-error" class="create-account-error"></div>
    </div>
</section>
