<section class="screen restaurants-list-screen">
    <h1 class="restaurants-list-title">RESTAURANTS</h1>
    <div class="restaurants-list-carousel-wrap">
        <button type="button" class="restaurants-list-nav restaurants-list-nav-prev" onclick="scrollRestaurantCards(-1)" aria-label="Previous restaurants">
            <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
        </button>
        <div class="restaurants-list-cards" id="restaurants-list-cards">
            <div class="restaurants-list-slide">
                <div class="restaurant-card" onclick="goToRestaurantScreen(1); return false;" role="button" tabindex="0">
                    <div class="restaurant-card-image-wrap">
                        <img class="restaurant-card-image" src="{{restaurantCardPizzaPalace}}" alt="Pizza Palace">
                    </div>
                    <div class="restaurant-card-info">
                        <span class="restaurant-card-name">PIZZA PALACE</span>
                        <i class="fa-regular fa-heart restaurant-card-favorite" aria-hidden="true"></i>
                    </div>
                </div>
                <div class="restaurant-card" onclick="goToRestaurantScreen(2); return false;" role="button" tabindex="0">
                    <div class="restaurant-card-image-wrap">
                        <img class="restaurant-card-image" src="{{restaurantCardBurgerHouse}}" alt="Burger House">
                    </div>
                    <div class="restaurant-card-info">
                        <span class="restaurant-card-name">BURGER HOUSE</span>
                        <i class="fa-regular fa-heart restaurant-card-favorite" aria-hidden="true"></i>
                    </div>
                </div>
            </div>
            <div class="restaurants-list-slide">
                <div class="restaurant-card" onclick="goToRestaurantScreen(3); return false;" role="button" tabindex="0">
                    <div class="restaurant-card-image-wrap">
                        <img class="restaurant-card-image" src="{{restaurantCardSushiWorld}}" alt="Sushi World">
                    </div>
                    <div class="restaurant-card-info">
                        <span class="restaurant-card-name">SUSHI WORLD</span>
                        <i class="fa-regular fa-heart restaurant-card-favorite" aria-hidden="true"></i>
                    </div>
                </div>
                <div class="restaurant-card" onclick="goToRestaurantScreen(4); return false;" role="button" tabindex="0">
                    <div class="restaurant-card-image-wrap">
                        <img class="restaurant-card-image" src="{{restaurantCardSaffronSerrano}}" alt="Saffron & Serrano">
                    </div>
                    <div class="restaurant-card-info">
                        <span class="restaurant-card-name">SAFFRON & SERRANO</span>
                        <i class="fa-regular fa-heart restaurant-card-favorite" aria-hidden="true"></i>
                    </div>
                </div>
            </div>
        </div>
        <button type="button" class="restaurants-list-nav restaurants-list-nav-next" onclick="scrollRestaurantCards(1)" aria-label="Next restaurants">
            <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
        </button>
    </div>
</section>
