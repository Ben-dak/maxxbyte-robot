<section class="screen restaurant-screen restaurant-screen-dynamic">
    <div class="restaurant-intro">
        <h1 class="restaurant-title">{{restaurantName}}</h1>
        <p class="restaurant-description">{{restaurantDescription}}</p>
    </div>
    <div class="menu-items menu-items-dynamic">
        {{#menuItems}}
        <div class="menu-item-card menu-item-card-dynamic">
            <h3 class="menu-item-title">{{name}}</h3>
            <div class="menu-item-row">
                <div class="menu-item-img-wrap">
                    <img class="menu-item-img" src="{{imageUrl}}" alt="{{name}}">
                    <button type="button" class="btn btn-add-cart" onclick="addToOrder('{{id}}')">ADD TO CART</button>
                </div>
                <div class="menu-item-desc-wrap">
                    <p class="menu-item-desc">{{description}}</p>
                    <p class="menu-item-price">${{priceFormatted}}</p>
                </div>
            </div>
        </div>
        {{/menuItems}}
    </div>
    <div id="saffron-checkout-bar" class="saffron-checkout-bar saffron-checkout-bar--hidden">
        <button type="button" id="saffron-checkout-btn" class="btn saffron-checkout-btn" onclick="openCartOverlay()">Checkout</button>
    </div>
</section>
